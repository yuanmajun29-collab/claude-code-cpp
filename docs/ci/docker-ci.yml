name: Docker CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: claude-code-cpp
  REGISTRY: ghcr.io

jobs:
  # ----------------------------------------------------------
  # Job 1: Build & Test inside Docker
  # ----------------------------------------------------------
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build in Docker
        run: docker build -f Dockerfile.dev -t claude-code-test .

      - name: Run tests
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=test-key \
            claude-code-test \
            bash -c "cd /src && \
              cmake -B build -DBUILD_TESTS=ON && \
              cmake --build build -j\$(nproc) && \
              ctest --test-dir build --output-on-failure --timeout 120"

      - name: Show test summary
        if: always()
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=test-key \
            claude-code-test \
            bash -c "cd /src && \
              [ -f build/Testing/Temporary/LastTestsFailed.log ] && \
              echo '::error::Some tests failed' && \
              cat build/Testing/Temporary/LastTestsFailed.log || \
              echo 'All tests passed!'"

  # ----------------------------------------------------------
  # Job 2: Build Production Image
  # ----------------------------------------------------------
  build-image:
    name: Build Production Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # Job 3: Security Scan (only on main/tags)
  # ----------------------------------------------------------
  scan:
    name: Security Scan
    needs: build-image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
